name: Daily Bus Data Crawler

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  run-spider:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Run crawler
        run: python api.py

      - name: List files for debugging
        run: ls -R

      - name: Upload result
        uses: actions/upload-artifact@v4
        with:
          name: spider-results
          path: "**/*.json"  # <--- 改成這行，它會搜尋所有資料夾下的 JSON 檔
          if-no-files-found: error
