name: Daily Bus Data Crawler

on:
  schedule:
    - [cite_start]cron: '0 0 * * *' # 每天觸發 [cite: 4467, 4607-4610]
  [cite_start]workflow_dispatch: # 手動觸發 [cite: 4614]

jobs:
  run-spider:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        [cite_start]uses: actions/checkout@v4 [cite: 4630-4631]

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          [cite_start]python-version: '3.10' [cite: 4636-4641]

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests [cite: 4650-4652]

      - name: Run crawler
        [cite_start]run: python api.py [cite: 4660-4661]

      - name: Upload result
        uses: actions/upload-artifact@v4
        with:
          name: spider-results
          [cite_start]path: taoyuan_bus.json [cite: 4664, 4673-4674]
